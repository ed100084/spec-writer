name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/python-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
